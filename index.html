<!DOCTYPE html>
<html>
<head>
<title>Computer Science Quiz</title>

<script>
let tabSwitchCount = 0;

document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        tabSwitchCount++;
    }
});

async function getIP() {
    const response = await fetch("https://api.ipify.org?format=json");
    const data = await response.json();
    document.getElementById("ip").value = data.ip;
}

function beforeSubmit(){
    document.getElementById("tabs").value = tabSwitchCount;
}

window.onload = getIP;
</script>

</head>

<body>

<h2>Computer Science Quiz</h2>

<form>

Student Name:<br>
<input type="text"><br><br>

Email:<br>
<input type="email"><br><br>

Question: Which data structure uses LIFO?<br>
<input type="radio" name="q1"> Stack<br>
<input type="radio" name="q1"> Queue<br>
<input type="radio" name="q1"> Tree<br><br>

Time Taken (minutes):<br>
<input type="number"><br><br>

<input type="hidden" id="ip">
<input type="hidden" id="tabs">

<input type="submit" value="Submit Quiz">

</form>

</body>
</html>
